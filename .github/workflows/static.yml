    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Amazon Ember', Arial, sans-serif; }
        
        /* Amazon Header */
        .amazon-header { background: #131921; color: white; padding: 8px 20px; display: flex; align-items: center; gap: 20px; position: sticky; top: 0; z-index: 1000; }
        .amazon-logo { font-size: 24px; font-weight: bold; }
        .location { font-size: 12px; }
        .search-bar { flex: 1; display: flex; max-width: 900px; }
        .search-bar select { padding: 10px; border: none; background: #f3f3f3; border-radius: 4px 0 0 4px; }
        .search-bar input { flex: 1; padding: 10px; border: none; }
        .search-bar button { padding: 10px 15px; background: #febd69; border: none; border-radius: 0 4px 4px 0; cursor: pointer; }
        .header-right { display: flex; gap: 20px; align-items: center; font-size: 12px; }
        .cart { display: flex; align-items: center; gap: 5px; }
        
        /* Navigation Bar */
        .nav-bar { background: #232f3e; color: white; padding: 10px 20px; display: flex; gap: 25px; font-size: 14px; overflow-x: auto; }
        .nav-bar a { color: white; text-decoration: none; white-space: nowrap; }
        
        /* Brand Store Content */
        .brand-container { max-width: 1500px; margin: 0 auto; }
        
        /* USRowing Logo Section */
        .brand-header { text-align: center; padding: 40px 20px; background: white; }
        .brand-logo { max-width: 600px; margin: 0 auto; }
        .brand-logo img { width: 100%; }
        
        /* Breadcrumb */
        .breadcrumb { padding: 15px 20px; font-size: 12px; color: #565959; }
        
        /* Store Navigation */
        .store-nav { background: white; padding: 20px; display: flex; justify-content: center; align-items: center; gap: 30px; border-bottom: 1px solid #ddd; flex-wrap: wrap; }
        .follow-btn { padding: 8px 20px; border: 1px solid #ddd; background: white; border-radius: 20px; cursor: pointer; }
        .share-btn { padding: 8px 15px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; }
        .store-nav a { color: #0F1111; text-decoration: none; font-weight: 500; font-size: 14px; text-transform: uppercase; }
        .store-nav a:hover { color: #C7511F; }
        .more-btn { color: #0F1111; font-weight: 500; cursor: pointer; }
        .search-store { padding: 8px 15px; border: 1px solid #ddd; border-radius: 4px; width: 200px; }
        
        /* Hero Banner */
        .hero-banner { position: relative; width: 100%; height: 500px; background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500"><rect fill="%23e8f4f8" width="1200" height="500"/></svg>'); background-size: cover; display: flex; align-items: center; justify-content: center; }
        .hero-content { text-align: center; color: white; z-index: 1; }
        .hero-content h1 { font-size: 48px; font-weight: bold; margin-bottom: 15px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .hero-content p { font-size: 18px; margin-bottom: 25px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .hero-btn { padding: 12px 40px; background: white; color: #0F1111; border: none; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .hero-btn:hover { background: #f0f0f0; }
        
        /* Product Tiles */
        .product-section { padding: 40px 20px; }
        .product-tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .product-tile { background: white; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; cursor: pointer; transition: box-shadow 0.3s; }
        .product-tile:hover { box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .product-tile img { width: 100%; height: 280px; object-fit: cover; background: #f0f0f0; }
        .product-info { padding: 15px; }
        .product-title { font-size: 14px; color: #0F1111; margin-bottom: 8px; }
        .product-price { font-size: 18px; color: #B12704; font-weight: bold; }
    </style>
</head>
